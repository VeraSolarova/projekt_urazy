<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úrazy - Detail</title>
</head>
<body>
    <h1>Detailní přehled úrazů</h1>

    <h2>Pohlaví</h2>
    <ul>
        {% for item in pohlavi_data %}
            <li>{{ item.pohlavi }} - rok: {{ item.rok }}</li>
        {% endfor %}
    </ul>

    <h2>Věkové kategorie</h2>
    <ul>
        {% for item in vek_data %}
            <li>Věk: {{ item.vek }} - rok: {{ item.rok }}</li>
        {% endfor %}
    </ul>

    <a href="{% url 'urazy_uvod' %}">Zpět na úvodní stránku</a>
</body>
</html>
